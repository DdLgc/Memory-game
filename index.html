<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Memory game</h1>

    <div class="game-info">
        <p>Temps : <span id="timer">00:00</span></p>
        <button id="restart-button">Recommencer</button>
    </div>
    <p>Coups : <span id="moves">0</span></p>
    <div id="game-board"></div>

    <div id="victory-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Bravo, vous avez gagné !</h2>
            <p>Temps final : <span id="final-time">00:00</span></p>
            <p>Coups : <span id="final-moves"></span></p>
            <button id="play-again-button">Rejouer</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
